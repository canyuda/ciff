version: "3.8"

services:
  ciff-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ciff-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-mysql-test}
      - MYSQL_PORT=3306
      - MYSQL_DB=ciff
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-123456}
      - REDIS_HOST=${REDIS_HOST:-redis-test}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DATABASE=1
      - PGVECTOR_HOST=${PGVECTOR_HOST:-pgvector}
      - PGVECTOR_PORT=5432
      - PGVECTOR_DB=ciff
      - PGVECTOR_USER=postgres
      - PGVECTOR_PASSWORD=${PGVECTOR_PASSWORD:-postgres}
      - SA_TOKEN_JWT_SECRET_KEY=${SA_TOKEN_JWT_SECRET_KEY:-change-me-in-production}
      - CIFF_API_KEY_SECRET=${CIFF_API_KEY_SECRET:-}
      - CIFF_FRONTEND_URL=${CIFF_FRONTEND_URL:-http://localhost}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-http://localhost/api/auth/github/callback}
    networks:
      - ciff-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: ciff-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../ciff-web/dist:/usr/share/nginx/html:ro
    depends_on:
      - ciff-app
    networks:
      - ciff-network

networks:
  ciff-network:
    name: ciff-network
    external: true
